<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>EBook Library Admin</title>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'pranjalS9/ebook-library',
            branch: 'main',
            auth_type: 'pkce',
            app_id: 'Ov23lilGcgB1gxn2S4Ny',
          },
          media_folder: 'public/images',
          public_folder: '/images',
          collections: [
            {
              name: 'chapters',
              label: 'Chapters',
              folder: 'src/content/chapters',
              create: true,
              delete: true,
              slug: '{{order}}-{{slug}}',
              fields: [
                { label: 'Title', name: 'title', widget: 'string' },
                { label: 'Order', name: 'order', widget: 'number', value_type: 'int', min: 1 },
                {
                  label: 'Content',
                  name: 'body',
                  widget: 'markdown',
                  hint: 'Separate pages with <!--page--> on its own line.',
                },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
